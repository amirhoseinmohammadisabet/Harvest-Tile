<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dukun Market</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .market-card { background-color: #34495e; padding: 15px; border-radius: 8px; border-left: 5px solid #9b59b6; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .market-card h3 { margin: 0 0 10px 0; color: #ecf0f1; }
        .market-card p { margin: 5px 0; color: #bdc3c7; }
        .badge { background-color: #2ecc71; color: #2c3e50; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="panel" style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0;">🏺 Dukun Market</h1>
        <div>
            <span style="margin-right: 15px; font-size: 1.2rem;">💵 Your Money: $<span id="player-money" style="color: #2ecc71; font-weight: bold;">0</span></span>
            <button onclick="window.location.href='game.html'" style="background-color: #e74c3c; font-size: 1.1rem;">⬅️ Back to Farm</button>
        </div>
    </div>

    <div id="message-box" class="message-box"></div>

    <div class="panel" style="background-color: #2c3e50; border: 1px solid #9b59b6;">
        <h2>📦 Sell Your Crops</h2>
        <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
            <div>
                <label style="display: block; margin-bottom: 5px;">Select Crop:</label>
                <select id="sell-crop-select" style="padding: 8px; border-radius: 4px; font-size: 1rem;"></select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px;">Amount to Sell:</label>
                <input type="number" id="sell-amount" min="1" value="1" style="padding: 8px; border-radius: 4px; font-size: 1rem; width: 100px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px;">Price PER ITEM ($):</label>
                <input type="number" id="sell-price" min="1" value="1" style="padding: 8px; border-radius: 4px; font-size: 1rem; width: 120px;">
            </div>
            <button id="post-listing-btn" style="background-color: #9b59b6; padding: 10px 20px;">Post to Market</button>
        </div>
    </div>

    <div class="panel">
        <h2>🌐 Live Listings</h2>
        <div id="market-container" class="market-grid">
            <p>Loading market data...</p>
        </div>
    </div>

    <script type="module" src="js/dukun.js"></script>
</body>
</html>
